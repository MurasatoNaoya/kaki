<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaki · finalist icons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--kaki:#e0633a;--paper:#efe9dd;--muted:#8a8273}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Zen Kaku Gothic New",sans-serif;
    background:radial-gradient(130% 100% at 20% 0%,#26231c,#131210 60%,#0c0b08);color:var(--paper);min-height:100vh;padding:42px 32px 60px}
  header{max-width:1100px;margin:0 auto 30px}
  h1{font-family:"Shippori Mincho",serif;font-weight:700;font-size:28px}h1 .k{color:var(--kaki)}
  .sub{color:var(--muted);margin-top:8px;font-size:14px;max-width:680px;line-height:1.6}
  .cards{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
  .card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:26px;display:flex;gap:24px;align-items:center}
  .big{width:180px;height:180px;border-radius:40px;flex:none;overflow:hidden;background:#f3ecdd;
    box-shadow:0 16px 36px -12px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.5)}
  .big svg{width:100%;height:100%}
  .meta{flex:1}
  .meta .id{font-size:13px;color:var(--kaki);font-weight:700}
  .meta h3{font-family:"Shippori Mincho",serif;font-weight:700;font-size:18px;margin:3px 0 14px}
  .sizes{display:flex;align-items:flex-end;gap:14px;background:#1a1813;border-radius:12px;padding:14px 16px}
  .sizes .s{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:10px}
  .sizes .sq{border-radius:22%;overflow:hidden;background:#f3ecdd}
  .sizes svg{width:100%;height:100%;display:block}
  .note{color:var(--muted);font-size:12px;margin-top:12px;line-height:1.5}
</style>
</head>
<body>
<header>
  <h1>柿 <span class="k">kaki</span> · finalist Dock icons</h1>
  <p class="sub">Your four picks — all <b>persimmon + olive calyx on cream</b>. Shown large, and at real Dock sizes (64 / 32 / 16&nbsp;px) to check they stay clear when small. Tell me which one to ship (or “#86 but bigger calyx”, etc.) and I’ll build the <b>.icns</b> and set it as the Dock icon.</p>
</header>
<div class="cards" id="cards"></div>
<script>
const KAKI="#e0633a",OLIVE="#6f7330";
const S=(i)=>`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${i}</svg>`;
const CAL="M50 27 C46 27 44 30 43 34 C39 32 35 33 34 37 C38 39 43 38 46 36 C47 40 48 42 50 42 C52 42 53 40 54 36 C57 38 62 39 66 37 C65 33 61 32 57 34 C56 30 54 27 50 27 Z";
const STEM=(c)=>`<rect x="48" y="20" width="4" height="8" rx="2" fill="${c}"/>`;
const M=KAKI,A=OLIVE;
const finals=[
 ["#36","Circle body + calyx", S(`<circle cx="50" cy="55" r="25" fill="${M}"/>${STEM(A)}<path d="${CAL}" fill="${A}"/>`)],
 ["#66","Rounded-square body", S(`<rect x="24" y="38" width="52" height="42" rx="19" fill="${M}"/>${STEM(A)}<path d="${CAL}" fill="${A}"/>`)],
 ["#86","Single leaf", S(`<circle cx="50" cy="56" r="24" fill="${M}"/>${STEM(A)}
    <path d="M53 33 C62 26 73 28 75 30 C72 41 61 43 55 38 C53 36 52 34 53 33 Z" fill="${A}"/>`)],
 ["#96","Ultra-minimal (dot + sprout)", S(`<circle cx="50" cy="57" r="22" fill="${M}"/>
    <path d="M50 35 C50 28 47 23 44 20" fill="none" stroke="${A}" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 35 C50 29 53 25 57 23" fill="none" stroke="${A}" stroke-width="4" stroke-linecap="round"/>`)],
];
const cards=document.getElementById('cards');
finals.forEach(([id,name,svg])=>{
  const sizes=[64,32,16].map(px=>`<div class="s"><div class="sq" style="width:${px}px;height:${px}px">${svg}</div>${px}px</div>`).join("");
  const el=document.createElement('div');el.className='card';
  el.innerHTML=`<div class="big">${svg}</div>
    <div class="meta"><div class="id">${id}</div><h3>${name}</h3>
      <div class="sizes">${sizes}</div>
      <div class="note">Persimmon #e0633a · olive calyx #6f7330 · cream tile</div></div>`;
  cards.appendChild(el);
});
</script>
</body>
</html>
