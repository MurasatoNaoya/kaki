<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="coal" cx="50%" cy="36%" r="80%">
      <stop offset="0" stop-color="#2c2823"/>
      <stop offset="1" stop-color="#121110"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="56%" r="46%">
      <stop offset="0" stop-color="#e0633a" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#e0633a" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#e0633a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="34%" r="78%">
      <stop offset="0" stop-color="#f4965d"/>
      <stop offset="0.45" stop-color="#e0633a"/>
      <stop offset="1" stop-color="#a6331a"/>
    </radialGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="calyx" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7e8730"/>
      <stop offset="1" stop-color="#525b20"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8c6c3c"/>
      <stop offset="1" stop-color="#5d4322"/>
    </linearGradient>
  </defs>

  <!-- coal tile -->
  <rect width="1024" height="1024" fill="url(#coal)"/>
  <!-- warm halo -->
  <circle cx="512" cy="600" r="400" fill="url(#halo)"/>

  <!-- body: oblate persimmon -->
  <ellipse cx="512" cy="600" rx="300" ry="252" fill="url(#body)"/>
  <!-- faint vertical lobes -->
  <g stroke="#8f2c16" stroke-width="6" fill="none" opacity="0.30" stroke-linecap="round">
    <path d="M388 410 C336 540 336 700 412 808"/>
    <path d="M636 410 C688 540 688 700 612 808"/>
  </g>
  <!-- glossy highlight -->
  <ellipse cx="430" cy="470" rx="120" ry="74" fill="url(#gloss)"/>

  <!-- woody stem -->
  <rect x="498" y="236" width="28" height="86" rx="14" fill="url(#stem)"/>

  <!-- calyx: four leaves draping over the top -->
  <g transform="translate(512,372)" fill="url(#calyx)" stroke="#3f471a" stroke-width="3">
    <g transform="rotate(-42)"><path d="M0 0 C-30 -52 -30 -110 0 -132 C30 -110 30 -52 0 0 Z"/></g>
    <g transform="rotate(42)"><path d="M0 0 C-30 -52 -30 -110 0 -132 C30 -110 30 -52 0 0 Z"/></g>
    <g transform="rotate(-104)"><path d="M0 0 C-28 -48 -28 -102 0 -122 C28 -102 28 -48 0 0 Z"/></g>
    <g transform="rotate(104)"><path d="M0 0 C-28 -48 -28 -102 0 -122 C28 -102 28 -48 0 0 Z"/></g>
    <circle r="18" fill="#566022" stroke="none"/>
  </g>
</svg>
